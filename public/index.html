<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ae.flux archive // AETHERNA OPERATOR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --hue: 190;
            --glow: 1;
            --contrast: 1;
            --bg: #05060c;
            --primary: hsl(var(--hue), 100%, 60%);
            --primary-low: hsl(var(--hue), 100%, 60%, 0.2);
            --text: hsl(var(--hue), 80%, 80%);
            --panel-bg: rgba(10, 11, 19, 0.9);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: thin; scrollbar-color: var(--primary) transparent; }
        body { background: var(--bg); color: var(--text); font-family: "JetBrains Mono", monospace; overflow-x: hidden; filter: contrast(var(--contrast)); min-height: 100vh; }
        canvas#matrix { position: fixed; inset: 0; z-index: -2; opacity: 0.4; }
        .crt-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 9998; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 3px, 3px 100%; opacity: 0.2; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 150%); pointer-events: none; z-index: 9997; }

        /* ================= LAYOUT ================= */
        .main-container { display: grid; grid-template-columns: 1fr 300px; max-width: 1400px; margin: 0 auto; padding: 80px 20px 180px; gap: 30px; }
        header { grid-column: 1 / -1; border-left: 4px solid var(--primary); padding-left: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .glitch { font-family: "Orbitron"; font-size: clamp(1.8rem, 5vw, 3rem); text-transform: uppercase; color: var(--primary); text-shadow: 0 0 calc(15px * var(--glow)) var(--primary-low); letter-spacing: 2px; }

        .btn-ingest { background: var(--primary); color: black; border: none; padding: 10px 20px; font-family: "Orbitron"; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-ingest:hover { box-shadow: 0 0 20px var(--primary); transform: scale(1.05); }

        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--panel-bg); border: 1px solid var(--primary-low); padding: 20px; border-radius: 4px; backdrop-filter: blur(8px); transition: var(--transition); }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 0 20px var(--primary-low); }
        .card h2 { font-family: "Orbitron"; font-size: 1.1rem; margin-bottom: 15px; color: var(--primary); cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* ================= EXPLORER ================= */
        #explorer-overlay, #ingest-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .window { width: 95%; max-width: 1000px; height: 80vh; background: var(--bg); border: 2px solid var(--primary); display: flex; flex-direction: column; animation: windowOpen 0.3s ease-out; }
        @keyframes windowOpen { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .window-header { background: var(--primary); color: black; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-family: "Orbitron"; font-weight: bold; font-size: 12px; }
        .toolbar { background: rgba(0,0,0,0.5); padding: 8px 20px; border-bottom: 1px solid var(--primary-low); display: flex; gap: 10px; }
        .view-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); font-family: "JetBrains Mono"; padding: 2px 10px; font-size: 10px; cursor: pointer; }
        .view-btn.active { background: var(--primary); color: black; }

        #explorer-content { flex: 1; overflow-y: auto; padding: 20px; align-content: start; }

        /* Icons/Grid */
        #explorer-content.grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .grid-view .file-item { text-align: center; padding: 15px; border: 1px solid transparent; cursor: pointer; }
        .grid-view .file-item:hover { background: var(--primary-low); border-color: var(--primary); }
        .grid-view .icon-wrapper { font-size: 32px; margin-bottom: 8px; }
        .grid-view .file-name { font-size: 10px; word-break: break-all; min-height: 24px; line-height: 1.2; }
        .grid-view .file-meta { display: none; }

        /* List View */
        .list-header { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 5px 15px; border-bottom: 1px solid var(--primary); font-size: 10px; text-transform: uppercase; color: var(--primary); font-weight: bold; }
        #explorer-content.list-view .file-item { display: grid; grid-template-columns: 2fr 1fr 1fr; padding: 8px 15px; border-bottom: 1px solid var(--primary-low); cursor: pointer; align-items: center; font-size: 11px; }
        .list-view .file-item:hover { background: var(--primary-low); }
        .list-view .icon-wrapper { margin-right: 10px; font-size: 16px; }

        /* ================= INGEST FORM ================= */
        .ingest-form { padding: 40px; display: flex; flex-direction: column; gap: 20px; color: var(--primary); }
        .ingest-form label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .ingest-form input, .ingest-form select { background: black; border: 1px solid var(--primary); color: white; padding: 12px; font-family: "JetBrains Mono"; outline: none; }
        .ingest-form input:focus { box-shadow: 0 0 10px var(--primary-low); }

        /* ================= TERMINAL ================= */
        #terminal { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.98); border-top: 2px solid var(--primary); padding: 15px 40px; z-index: 9998; }
        #terminal-output { max-height: 80px; overflow-y: auto; margin-bottom: 10px; font-size: 11px; line-height: 1.5; }
        .terminal-line { margin-bottom: 2px; }
        .ai-reply { color: #00ff9c; }
        .terminal-input-wrap { display: flex; align-items: center; }
        .terminal-input-wrap::before { content: "FLUX_OS >"; margin-right: 15px; color: var(--primary); font-weight: bold; font-size: 11px; }
        #terminal-input { background: transparent; border: none; outline: none; color: #fff; font-family: inherit; flex: 1; font-size: 11px; }

        #boot { position: fixed; inset: 0; background: #000; color: #00ff9c; padding: 50px; font-size: 14px; z-index: 10000; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
        #boot span { opacity: 0; transform: translateX(-10px); animation: bootIn 0.1s forwards; }
        @keyframes bootIn { to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>
<div class="crt-overlay"></div>
<div class="vignette"></div>
<div id="boot"></div>

<div class="main-container">
    <header>
        <div>
            <h1 class="glitch">ae.flux archive</h1>
            <p style="font-size: 10px; opacity: 0.6; margin-top: 5px;">AETHERNA FLUX REPOSITORY: <br> A stooge and friends collaboration.</p>
        </div>
        <button class="btn-ingest" onclick="toggleIngest(true)">+ INGEST DATA</button>
    </header>

    <div class="archive-grid">
        <section class="card"><h2 data-path="/audio">/audio</h2></section>
        <section class="card"><h2 data-path="/gaming">/gaming</h2></section>
        <section class="card"><h2 data-path="/literature">/literature</h2></section>
        <section class="card"><h2 data-path="/video">/video</h2></section>
        <section class="card"><h2 data-path="/music">/music</h2></section>
        <section class="card"><h2 data-path="/classified">/classified</h2></section>
    </div>
</div>

<!-- VIRTUAL EXPLORER -->
<div id="explorer-overlay">
    <div class="window">
        <div class="window-header">
            <span id="explorer-path">INDEX://ROOT</span>
            <button onclick="closeExplorer()" style="background:black; color:white; border:none; cursor:pointer; padding: 2px 8px;">[X]</button>
        </div>
        <div class="toolbar">
            <button class="view-btn active" id="btn-grid" onclick="setView('grid')">Large Icons</button>
            <button class="view-btn" id="btn-list" onclick="setView('list')">Detailed</button>
        </div>
        <div id="explorer-content" class="grid-view"></div>
    </div>
</div>

<!-- INGEST WIDGET -->
<div id="ingest-overlay">
    <div class="window" style="max-width: 500px; height: auto;">
        <div class="window-header">
            <span>DATA_INGEST_V1</span>
            <button onclick="toggleIngest(false)" style="background:black; color:white; border:none; cursor:pointer; padding: 2px 8px;">[X]</button>
        </div>
        <div class="ingest-form">
            <label>Full Google Drive Link</label>
            <input type="text" id="ingest-link" placeholder="Paste link here...">
            
            <label>Filename (with extension)</label>
            <input type="text" id="ingest-name" placeholder="audio_file.wav">
            
            <label>Target Directory</label>
            <select id="ingest-path">
                <option value="/audio">/audio</option>
                <option value="/gaming">/gaming</option>
                <option value="/literature">/literature</option>
                <option value="/video">/video</option>
                <option value="/music">/music</option>
                <option value="/classified">/classified</option>
            </select>
            
            <button class="btn-ingest" onclick="processIngest()">START INGESTION</button>
        </div>
    </div>
</div>

<div id="terminal">
    <div id="terminal-output"></div>
    <div class="terminal-input-wrap"><input id="terminal-input" placeholder="Query AI assistant..." autocomplete="off"></div>
</div>

<script>
/* ================= DATA MAPPING ================= */
const archiveData = {
    "/audio": [
        { name: "Kick_Deep_01.wav", date: "2024-03-01", size: "1.2 MB", id: "1ZcijR57CTIEKXdN_jdTmChcEg0c3ax_l" }
    ],
    "/gaming": [],
    "/literature": [],
    "/video": [],
    "/music": [],
    "/classified": []
};

/* ================= INGEST LOGIC ================= */
function toggleIngest(show) {
    document.getElementById('ingest-overlay').style.display = show ? 'flex' : 'none';
}

function processIngest() {
    const link = document.getElementById('ingest-link').value;
    const name = document.getElementById('ingest-name').value;
    const path = document.getElementById('ingest-path').value;

    // Regex to extract ID from Drive links
    const idMatch = link.match(/[-\w]{25,}/);
    
    if(!idMatch || !name) {
        alert("Invalid Link or Filename missing.");
        return;
    }

    const newFile = {
        name: name,
        date: new Date().toISOString().split('T')[0],
        size: "UNK KB",
        id: idMatch[0]
    };

    // Add to session data
    archiveData[path].push(newFile);
    
    logToTerminal(`INGEST SUCCESS: ${name} added to ${path}`);
    toggleIngest(false);

    // Refresh if viewing that folder
    if(currentPath === path) openExplorer(path);

    // Clear form
    document.getElementById('ingest-link').value = "";
    document.getElementById('ingest-name').value = "";
}

/* ================= EXPLORER LOGIC ================= */
let currentView = 'grid';
let currentPath = '';

function setView(mode) {
    currentView = mode;
    document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
    document.getElementById('btn-list').classList.toggle('active', mode === 'list');
    if(currentPath) openExplorer(currentPath);
}

function openExplorer(path) {
    currentPath = path;
    const overlay = document.getElementById("explorer-overlay");
    const content = document.getElementById("explorer-content");
    const pathText = document.getElementById("explorer-path");
    
    overlay.style.display = "flex";
    pathText.innerText = `BROWSER://ROOT${path.toUpperCase()}`;
    content.className = currentView + '-view';
    
    let html = "";
    if (currentView === 'list') {
        html += `<div class="list-header"><div>Name</div><div>Date</div><div>Size</div></div>`;
    }

    const files = archiveData[path];
    if (files.length === 0) {
        content.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--primary); font-family: 'Orbitron';">NO DATA DETECTED IN SECTOR.</div>`;
        return;
    }
    
    files.forEach(file => {
        const ext = file.name.split('.').pop().toLowerCase();
        let icon = "📄", color = "var(--text)";
        if(['mp3','wav','flac'].includes(ext)) { icon="🎵"; color="#00e5ff"; }
        if(['pdf','txt','epub'].includes(ext)) { icon="📖"; color="#a2ff00"; }
        if(['exe','iso','bin','gba'].includes(ext)) { icon="⚙️"; color="#00ff9c"; }
        if(['zip','rar','7z'].includes(ext)) { icon="📦"; color="#ffb300"; }
        
        html += `
            <div class="file-item" onclick="downloadFile('${file.id}', '${file.name}')">
                <div class="name-col">
                    <span class="icon-wrapper" style="color:${color}">${icon}</span>
                    <span class="file-name">${file.name}</span>
                </div>
                <div class="file-meta">${file.date}</div>
                <div class="file-meta">${file.size}</div>
            </div>
        `;
    });
    content.innerHTML = html;
}

function downloadFile(id, name) {
    logToTerminal(`FETCHING ARTIFACT: ${name}...`);
    window.open(`https://drive.google.com/uc?export=download&id=${id}`, '_blank');
}

function closeExplorer() { document.getElementById("explorer-overlay").style.display = "none"; }

/* ================= SYSTEM ================= */
document.querySelectorAll(".card h2").forEach(h2 => {
    h2.addEventListener("click", () => openExplorer(h2.dataset.path));
});

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
let width, height, columns, drops;
function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; columns = Math.floor(width / 16); drops = Array(columns).fill(1); }
window.addEventListener('resize', resize); resize();
function draw() { ctx.fillStyle = "rgba(5, 6, 12, 0.1)"; ctx.fillRect(0, 0, width, height); ctx.fillStyle = "#00ff9c"; ctx.font = "16px monospace"; for (let i = 0; i < drops.length; i++) { ctx.fillText(Math.random() > 0.5 ? "0" : "1", i * 16, drops[i] * 16); if (drops[i] * 16 > height && Math.random() > 0.975) drops[i] = 0; drops[i]++; } requestAnimationFrame(draw); }
draw();

const bootStrings = ["Initializing Flux Kernel...", "Establishing Secure Link...", "Welcome, Operator."];
const bootContainer = document.getElementById("boot");
bootStrings.forEach((t, i) => { const s = document.createElement("span"); s.innerText = t; s.style.animationDelay = `${i * 0.4}s`; bootContainer.appendChild(s); });
setTimeout(() => { bootContainer.style.opacity = "0"; setTimeout(() => bootContainer.style.display = "none", 1000); }, 2500);

const output = document.getElementById("terminal-output");
function logToTerminal(msg) { const l = document.createElement("div"); l.className = "ai-reply"; l.innerText = `> ${msg}`; output.appendChild(l); output.scrollTop = output.scrollHeight; }
</script>
</body>
</html>
